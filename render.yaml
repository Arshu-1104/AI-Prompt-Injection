services:
  - type: web
    name: promptguard-api
    env: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: promptguard-db
          property: connectionString
      - key: ADMIN_SECRET_KEY
        generateValue: true

databases:
  - name: promptguard-db
    plan: free