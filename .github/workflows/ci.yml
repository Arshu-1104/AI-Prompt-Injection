name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m src.load_data
      - run: python -m src.train_classical
      - name: Robustness check
        run: |
          python -m src.robustness > robustness_output.txt
          cat robustness_output.txt
          SCORE=$(grep "Robustness score:" robustness_output.txt | grep -oE '[0-9]+\.[0-9]+')
          echo "Robustness score: $SCORE"
          BASELINE="${{ vars.ROBUSTNESS_BASELINE }}"
          if [ -z "$BASELINE" ]; then BASELINE="0.75"; fi
          python -c "import sys; score=float('$SCORE'); baseline=float('$BASELINE'); sys.exit(0 if score >= baseline else 1)"

  test-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  test-extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run build
